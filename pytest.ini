[pytest]
# -n auto: pytest-xdist runs tests in parallel across N worker processes,
# where N is the CPU count. Each worker is a separate Python process, so
# MLflow's per-process FileStore caches don't collide across workers and
# pytest's per-test ``tmp_path`` keeps filesystem isolation intact.
#
# --dist=loadfile: tests in the same file always go to the same worker
# (preserving intra-file order). Some plugin tests in test_plugin_smoke.py
# depend on hidden state from earlier tests in the same file
# (e.g. VerifiedModel patches that only work after a previous test has
# warmed certain MLflow internals). Without loadfile they fail when
# distributed across workers. Files still parallelise — we lose
# within-file parallelism for the biggest file, but plugin_smoke's
# 92 tests are pure-Python and fast, so the bottleneck files
# (test_tamper_endpoints / test_demo_reset / test_dataset_first)
# still get their own workers.
#
# --tb=short: keep failure tracebacks compact in the parallel output
# stream so the slowest-test summary stays readable.
#
# Combined with the ``VAIDR_TAMPER_TTL_SECONDS=0`` overrides in the
# TestClient-booting fixtures, this drops a full suite run from ~7:11
# to about 60s on a typical dev machine (59.66s measured in PR #16).
addopts = -n auto --dist=loadfile --tb=short
